name: Deploy Website (dev)

# Self-hosted Windows runner deploys the public marketing site to the dev box at
# C:\node\HHWebsite and runs it under PM2 (vite dev server on port 5175).
# Reverse-proxy your dev gateway entry for website.factree.au at this port.
#
# Mirrors HHjsFrontEnd/.github/workflows/deploy.yml so the operational model
# stays consistent across all three Factree dev apps.

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEPLOY_PATH: C:\node\HHWebsite
  PM2_HOME_PATH: ${{ vars.PM2_HOME_PATH }}
  DEFAULT_VITE_API_BASE_URL: https://api.factree.au/api

concurrency:
  group: deploy-website
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, windows]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Configure git safe directories
        shell: pwsh
        run: |
          git config --global --add safe.directory "${{ github.workspace }}"
          $safePath = ($env:DEPLOY_PATH -replace '\\', '/')
          git config --global --add safe.directory "$safePath"

      - name: Verify checkout SHA
        shell: pwsh
        run: |
          $head = git rev-parse HEAD
          if ($head -ne "${{ github.sha }}") {
            Write-Error "Checkout SHA mismatch: expected ${{ github.sha }}, got $head"
            exit 1
          }
          Write-Host "Checkout verified: $head"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies (workspace)
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Resolve shared PM2 home
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PM2_HOME_PATH)) {
            Write-Error "PM2_HOME_PATH is required for shared PM2 mode. Set repository variable PM2_HOME_PATH to your existing PM2 home path (example: C:\\Users\\<service-user>\\.pm2)."
            exit 1
          }

          New-Item -ItemType Directory -Path $env:PM2_HOME_PATH -Force | Out-Null
          $probe = Join-Path $env:PM2_HOME_PATH ".write-probe"
          Set-Content -Path $probe -Value "ok"
          Remove-Item -Path $probe -Force

          "PM2_HOME=$env:PM2_HOME_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using shared PM2_HOME=$env:PM2_HOME_PATH"

      - name: Stop PM2 (release file locks)
        shell: pwsh
        run: |
          Write-Host "Using PM2_HOME=$env:PM2_HOME"

          pm2 describe hh-website *> $null
          if ($LASTEXITCODE -eq 0) {
            pm2 stop hh-website
            if ($LASTEXITCODE -ne 0) {
              Write-Error "PM2 found hh-website but failed to stop it."
              exit 1
            }
            Write-Host "PM2 stopped hh-website"
          } else {
            Write-Host "PM2 process hh-website was not running"
            $global:LASTEXITCODE = 0
          }

      - name: Deploy source files
        shell: pwsh
        run: |
          if (-not (Test-Path $env:DEPLOY_PATH)) {
            Write-Error "Deploy target $env:DEPLOY_PATH does not exist. One-time setup: git clone the repo into $env:DEPLOY_PATH, copy .env.local from .env.example, populate VITE_API_BASE_URL=https://api.factree.au/api"
            exit 1
          }
          cd $env:DEPLOY_PATH
          git fetch origin main
          git reset --hard origin/main
          Write-Host "Deployed: $(git rev-parse HEAD)"

      - name: Ensure .env.local exists
        shell: pwsh
        run: |
          # .env.local is the dev server's runtime config (gitignored, local-only).
          # Vite auto-loads it in both dev and build modes.
          $envFile = Join-Path $env:DEPLOY_PATH ".env.local"
          if (-not (Test-Path $envFile)) {
            $exampleEnvFile = Join-Path $env:DEPLOY_PATH ".env.example"
            if (Test-Path $exampleEnvFile) {
              Copy-Item -Path $exampleEnvFile -Destination $envFile -Force
            } else {
              Set-Content -Path $envFile -Value ""
            }

            $content = Get-Content -Path $envFile -Raw -ErrorAction SilentlyContinue
            if ($null -eq $content) {
              $content = ""
            }

            if ($content -match '(?m)^\s*VITE_API_BASE_URL\s*=') {
              $updated = [regex]::Replace(
                $content,
                '(?m)^\s*VITE_API_BASE_URL\s*=.*$',
                "VITE_API_BASE_URL=$env:DEFAULT_VITE_API_BASE_URL"
              )
              Set-Content -Path $envFile -Value $updated
            } else {
              Add-Content -Path $envFile -Value "VITE_API_BASE_URL=$env:DEFAULT_VITE_API_BASE_URL"
            }

            Write-Warning ".env.local was missing and has been created at $envFile"
          } else {
            Write-Host ".env.local file verified"
          }

      - name: Install dependencies (server)
        shell: pwsh
        run: |
          cd $env:DEPLOY_PATH
          if (Test-Path "package-lock.json") {
            npm ci --no-audit --no-fund
          } else {
            npm install --no-audit --no-fund --no-package-lock
          }

      - name: Start PM2
        shell: pwsh
        run: |
          cd $env:DEPLOY_PATH
          Write-Host "Using PM2_HOME=$env:PM2_HOME"

          pm2 delete hh-website 2>$null
          pm2 start ecosystem.config.cjs
          pm2 save
          Start-Sleep -Seconds 3
          pm2 status
          Write-Host "PM2 started and saved"

      - name: Health check
        shell: pwsh
        run: |
          $maxRetries = 10
          $delay = 5
          for ($i = 1; $i -le $maxRetries; $i++) {
            Start-Sleep -Seconds $delay
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:5175" -UseBasicParsing -TimeoutSec 5
              if ($response.StatusCode -eq 200) {
                Write-Host "Health check passed (attempt $i)"
                exit 0
              }
            } catch {
              Write-Host "Attempt $i/$maxRetries failed: $_"
            }
          }
          Write-Error "Health check failed after $maxRetries attempts"
          exit 1

      - name: Summary
        if: always()
        shell: pwsh
        run: |
          $status = if ("${{ job.status }}" -eq "success") { "✅ Deployed" } else { "❌ Failed" }
          $summary = @"
          ## Website Deploy $status
          - **Commit:** ``${{ github.sha }}``
          - **Branch:** ``${{ github.ref_name }}``
          - **By:** ${{ github.actor }}
          - **Time:** $(Get-Date -Format "yyyy-MM-dd HH:mm:ss")
          - **URL (dev):** https://website.factree.au
          "@
          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
